<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="refresh" content="2;url=http://localhost:3001" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HealthFirst360 — Launch</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
      background: #0f1419;
      color: #e5e7eb;
      padding: 24px;
    }
    .card {
      max-width: 420px;
      width: 100%;
      background: #1a2332;
      border: 1px solid #2d3a4f;
      border-radius: 20px;
      padding: 32px;
      text-align: center;
    }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    p { color: #9ca3af; font-size: 0.95rem; margin-bottom: 24px; }
    a {
      display: inline-block;
      padding: 14px 28px;
      background: linear-gradient(135deg, #22d3ee, #a78bfa);
      color: #0f1419;
      font-weight: 700;
      text-decoration: none;
      border-radius: 12px;
    }
    a:hover { opacity: 0.9; }
    .hint { margin-top: 20px; font-size: 0.8rem; color: #6b7280; }
    code { background: #0f1419; padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>HealthFirst360</h1>
    <p>Health Check-up Flow Management — frontend &amp; backend combined</p>
    <a href="http://localhost:3001">Open App → http://localhost:3001</a>
    <p class="hint">Start the server first: <code>npm run dev</code> or double-click <code>start-app.bat</code></p>
  </div>
</body>
</html>
